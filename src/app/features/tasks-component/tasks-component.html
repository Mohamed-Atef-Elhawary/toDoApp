<div class="p-2 flex flex-col gap-4">
  <app-page-title-component [category]="category()" />
  @if (category() === 'all') {
    <app-task-input-component (newTask)="onNewTask($event)" />
  }
  <div>
    <h2>Tasks</h2>
    <app-task-item-component
      [allTasks]="specificTasks()"
      (toggleImportant)="onToggleImportant($event)"
      (toggleComplete)="onToggleComplete($event)"
    />
  </div>
</div>
